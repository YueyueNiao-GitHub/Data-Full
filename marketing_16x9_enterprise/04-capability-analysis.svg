    <text fill="#1F5FE5" font-family="腾讯体, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-style="normal" font-weight="700"><tspan x="124" y="276">“ Data Fill 不是单纯的随机数据工具，而是一套围绕字段规则组织起来的数据填充系统 ”</tspan></text>
  
      <rect x="96" y="372" width="1728" height="84" fill="#EEF4FF"/>
