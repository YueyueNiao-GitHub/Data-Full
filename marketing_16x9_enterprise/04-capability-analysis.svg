      <line x1="1040" y1="372" x2="1040" y2="860" stroke="#D8E3F5"/>
      <text x="390" y="426" fill="#0E2347" font-family="腾讯体, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">核心理念</text>
      <text x="1080" y="426" fill="#0E2347" font-family="腾讯体, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="700">当前能力</text>
      <line x1="96" y1="456" x2="1824" y2="456" stroke="#D8E3F5"/>
      <line x1="96" y1="578" x2="1824" y2="578" stroke="#D8E3F5"/>
      <line x1="96" y1="700" x2="1824" y2="700" stroke="#D8E3F5"/>
      <line x1="96" y1="822" x2="1824" y2="822" stroke="#D8E3F5"/>
      <text fill="#0E2347" font-family="腾讯体, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-style="normal" font-weight="700"><tspan x="130" y="526">文本字段</tspan></text>
      <text fill="#0E2347" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-style="normal" font-weight="600"><tspan x="390" y="514">支持文本、数字、日期等结构化内容，</tspan><tspan x="390" y="552">可按字段规则生成并长期复用</tspan></text>
      <text fill="#1F5FE5" font-family="腾讯体, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-style="normal" font-weight="700"><tspan x="1080" y="514">随机、顺序、自增、格式配置、批量填充</tspan></text>
      <text fill="#0E2347" font-family="腾讯体, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-style="normal" font-weight="700"><tspan x="130" y="648">图片字段</tspan></text>
      <text fill="#0E2347" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-style="normal" font-weight="600"><tspan x="390" y="636">把头像、封面图等视觉素材也纳入字段列表，</tspan><tspan x="390" y="674">统一到同一套操作方式中</tspan></text>
      <text fill="#1F5FE5" font-family="腾讯体, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-style="normal" font-weight="700"><tspan x="1080" y="636">内置真人头像、卡通头像、Banner / 背景图</tspan></text>
      <text fill="#0E2347" font-family="腾讯体, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-style="normal" font-weight="700"><tspan x="130" y="770">AI 字段</tspan></text>
      <text fill="#0E2347" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-style="normal" font-weight="600"><tspan x="390" y="758">把提示词保存成字段，而不是每次重新生成，</tspan><tspan x="390" y="796">更适合高频说明文案与内容占位</tspan></text>
      <text fill="#1F5FE5" font-family="腾讯体, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-style="normal" font-weight="700"><tspan x="1080" y="758">新建 AI 字段、预览确认、后续继续复用</tspan></text>
    
