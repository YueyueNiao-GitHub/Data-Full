<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Fill Enterprise Marketing</title>
  <style>
    body { margin: 0; padding: 28px; background: #f5f8fc; font-family: PingFang SC, Microsoft YaHei, sans-serif; color: #0E2347; }
    h1 { margin: 0 0 12px; font-size: 30px; }
    p { margin: 0 0 20px; color: #607290; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 28px; }
    .card { background: #fff; border: 1px solid #D8E3F5; border-radius: 16px; padding: 16px; }
    .label { margin: 0 0 12px; font-weight: 700; color: #1F5FE5; }
    img { width: 100%; display: block; border: 1px solid #D8E3F5; }
  </style>
</head>
<body>
  <h1>Data Fill 企业展示风宣传图</h1>
  <p>浅色、蓝白结构、参考你给的业务汇报版式，字体按 腾讯体 + 苹方 输出。</p>
  <div class="grid">
    
      <div class="card">
        <div class="label">01-overview.svg</div>
        <img src="./png/01-overview.png" alt="01-overview.svg" />
      </div>
    
      <div class="card">
        <div class="label">02-pain-points.svg</div>
        <img src="./png/02-pain-points.png" alt="02-pain-points.svg" />
      </div>
    
      <div class="card">
        <div class="label">03-core-system.svg</div>
        <img src="./png/03-core-system.png" alt="03-core-system.svg" />
      </div>
    
      <div class="card">
        <div class="label">04-capability-analysis.svg</div>
        <img src="./png/04-capability-analysis.png" alt="04-capability-analysis.svg" />
      </div>
    
      <div class="card">
        <div class="label">05-workflow.svg</div>
        <img src="./png/05-workflow.png" alt="05-workflow.svg" />
      </div>
    
      <div class="card">
        <div class="label">06-cta.svg</div>
        <img src="./png/06-cta.png" alt="06-cta.svg" />
      </div>
    
  </div>
</body>
</html>
