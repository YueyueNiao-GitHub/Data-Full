    // 关闭配置面板
    function closeConfigPanel() {
      document.getElementById('configPanel').style.display = 'none';
      currentConfigFieldId = null;
    }

    // 保存配置
    function saveConfig() {
      console.log('保存配置，当前字段:', currentConfigFieldId);

      if (!currentConfigFieldId) {
        console.error('没有选中的字段');
        return;
      }

      let config = {};

      // 查找字段信息以获取 configType
      const field = getFieldById(currentConfigFieldId);
      const configType = field ? (field.configType || field.id) : currentConfigFieldId;

      switch (configType) {
        case 'enum':
          const checkedOptions = Array.from(document.querySelectorAll('input[name="enumOptions"]:checked')).map(cb => cb.value);
          if (checkedOptions.length > 0) {
            config.options = checkedOptions;
          }
          console.log('Enum配置:', config);
          break;

        case 'person_name':
          const gender = document.querySelector('input[name="gender"]:checked');
          const language = document.querySelector('input[name="language"]:checked');
          if (gender) config.gender = gender.value;
          if (language) config.language = language.value;
          console.log('人员姓名配置:', config);
          break;

        case 'date_time':
          const timeType = document.querySelector('input[name="timeType"]:checked');
          const dateFormat = document.querySelector('input[name="dateFormat"]:checked');
          const includeSeconds = document.querySelector('input[name="includeSeconds"]:checked');
          const order = document.querySelector('input[name="order"]:checked');
          if (timeType) config.timeType = timeType.value;
          if (dateFormat) config.format = dateFormat.value;
          if (includeSeconds) config.includeSeconds = includeSeconds.value;
          if (order) config.order = order.value;
          console.log('日期时间配置:', config);
          break;

        case 'number_value':
          const numMin = document.getElementById('configNumberMin');
          const numMax = document.getElementById('configNumberMax');
          const thousandsSeparator = document.querySelector('input[name="thousandsSeparator"]:checked');
          const decimals = document.querySelector('input[name="decimals"]:checked');
          const percentage = document.querySelector('input[name="percentage"]:checked');
          if (numMin) config.min = parseInt(numMin.value) || 100;
          if (numMax) config.max = parseInt(numMax.value) || 10000;
          if (thousandsSeparator) config.thousandsSeparator = thousandsSeparator.value;
          if (decimals) config.decimals = decimals.value;
          if (percentage) config.percentage = percentage.value;
          console.log('数字数值配置:', config);
          break;

        case 'serial_number':
          const serialStart = document.getElementById('configSerialStart');
          const serialPrefix = document.getElementById('configSerialPrefix');
          const serialSuffix = document.getElementById('configSerialSuffix');
          const serialOrder = document.querySelector('input[name="serialOrder"]:checked');
          const serialPadding = document.querySelector('input[name="serialPadding"]:checked');

          if (serialStart) config.start = parseInt(serialStart.value) || 1;
          if (serialPrefix) config.prefix = serialPrefix.value;
          if (serialSuffix) config.suffix = serialSuffix.value;
          if (serialOrder) config.order = serialOrder.value;
          if (serialPadding) config.padding = serialPadding.value;
          console.log('序号配置:', config);
          break;

        case 'finance_amount':
          const amountMin = document.getElementById('configAmountMin');
          const amountMax = document.getElementById('configAmountMax');
          if (amountMin && amountMax) {
            config.min = parseInt(amountMin.value) || 100;
            config.max = parseInt(amountMax.value) || 50000;
            console.log('金额范围配置:', config);
          }
          break;

        case 'contact_phone':
          const phoneFormat = document.querySelector('input[name="phoneFormat"]:checked');
          const phoneSeparator = document.querySelector('input[name="phoneSeparator"]:checked');
          if (phoneFormat) config.format = phoneFormat.value;
          if (phoneSeparator) config.separator = phoneSeparator.value;
          console.log('手机号码配置:', config);
          break;

        case 'location_address':
          const addressLevel = document.querySelector('input[name="addressLevel"]:checked');
          if (addressLevel) config.level = addressLevel.value;
          console.log('详细地址配置:', config);
          break;

        case 'account_email':
          const emailType = document.querySelector('input[name="emailType"]:checked');
          if (emailType) config.type = emailType.value;
          console.log('邮箱地址配置:', config);
          break;

        case 'company_department':
          const deptFormat = document.querySelector('input[name="deptFormat"]:checked');
          if (deptFormat) config.format = deptFormat.value;
          console.log('所属部门配置:', config);
          break;
      }

      console.log('准备保存配置:', currentConfigFieldId, config);

      if (saveFieldConfig(currentConfigFieldId, config)) {
        console.log('配置保存成功');
        closeConfigPanel();
        // 发送配置更新消息给 code.ts
        sendMessage('update-config', {
          fieldId: currentConfigFieldId,
          config: config
        });
      } else {
        console.error('配置保存失败');
      }
    }

    // 绑定配置面板事件
    document.getElementById('configClose').addEventListener('click', closeConfigPanel);
    document.getElementById('configCancel').addEventListener('click', closeConfigPanel);
    document.getElementById('configSave').addEventListener('click', saveConfig);
    document.querySelector('.config-overlay').addEventListener('click', closeConfigPanel);

    function getFolderStates() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : {};
      } catch (e) {
        return {};
      }
    }

    function saveFolderState(folderId, collapsed) {
      try {
        const states = getFolderStates();
        states[folderId] = collapsed;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(states));
      } catch (e) {
        console.error('保存折叠状态失败:', e);
      }
    }

    // 渲染字段卡片
    // 根据 ID 查找字段
    function getFieldById(fieldId) {
      for (const category in DEFAULT_FIELDS) {
        const field = DEFAULT_FIELDS[category].find(f => f.id === fieldId);
        if (field) return field;
      }
      const customField = customFields.find(field => field.id === fieldId);
      if (customField) return customField;
      for (const folder of customFolders) {
        const folderField = folder.fields.find(field => field.id === fieldId);
        if (folderField) return folderField;
      }
      return null;
    }

    // 获取字段图标的SVG引用
    function getFieldIconSVG(field) {
      // 映射字段ID/configType到图标名称
      const iconMap = {
        // AI字段
        'ai_new_title': 'ai',
        'ai_short_desc': 'ai',
        
        // 默认字段
        'person_name': 'person',
        'date_time': 'calendar',
        'number_value': 'number',
        'serial_number': 'sequence',
        'contact_phone': 'phone',
        'account_email': 'email',
        'company_department': 'department',
        'location_address': 'location',
        
        // 人事领域
        'hr_employee_id': 'person',
        'hr_name': 'person',
        'hr_gender': 'person',
        'hr_age': 'person',
        'hr_entry_date': 'calendar',
        'hr_regular_date': 'calendar',
        'hr_resign_date': 'calendar',
        'hr_level': 'sequence',
        'hr_position': 'department',
        'hr_work_years': 'hourglass',
        
        // 财务领域
        'finance_salary_month': 'finance',
        'finance_salary_year': 'finance',
        'finance_bonus': 'finance',
        'finance_performance': 'number',
        'finance_reimbursement': 'finance',
        'finance_cost': 'finance',
        'finance_revenue': 'finance',
        'finance_profit': 'finance',
        'finance_budget': 'finance',
        'finance_date': 'calendar',
        
        // 账户领域
        'user_id': 'account',
        'user_nickname': 'person',
        'user_register_date': 'calendar',
        'user_last_login': 'calendar',
        'user_login_count': 'number',
        'user_status': 'account',
        'user_level': 'account',
        'user_vip_expire': 'calendar',
        
        // 订单领域
        'order_id': 'cart',
        'order_status': 'cart',
        'order_create_time': 'calendar',
        'order_pay_time': 'calendar',
        'order_amount': 'finance',
        'order_actual_amount': 'finance',
        'order_pay_method': 'finance',
        'order_refund_status': 'finance',
        'order_logistics_no': 'cart',
        'order_logistics_company': 'cart',
        'order_remark': 'text'
      };
      
      // 获取图标名称
      let iconName = iconMap[field.id] || 'text';
      
      // 如果字段有configType，尝试映射
      if (field.configType) {
        const configTypeMap = {
          'person_name': 'person',
          'date_time': 'calendar',
          'number_value': 'number',
          'serial_number': 'sequence',
          'enum': 'text',
          'finance_amount': 'finance',
          'text': 'text'
        };
        iconName = configTypeMap[field.configType] || iconName;
      }
      
      return `<svg><use href="#icon-${iconName}"></use></svg>`;
    }

    function getFieldIconStyle(field) {
      const isCustomAIField = field.id && field.id.startsWith('ai_custom_');
      const isAIField = field.id && field.id.startsWith('ai_');
      const isDefaultField = field.id && ['person_name', 'date_time', 'number_value', 'serial_number', 'contact_phone', 'account_email', 'company_department', 'location_address'].includes(field.id);
      const background = field.iconBg || (isAIField || isCustomAIField ? '#f5f0ff' : '#eaf2ff');
      const color = field.iconColor || (isAIField || isCustomAIField ? '#7c3aed' : '#2563eb');
      const border = field.iconBorder || (isAIField || isCustomAIField ? '#e0d7ff' : isDefaultField ? '#bfd6ff' : field.iconBg || '#dbeafe');

      return `background: ${background}; color: ${color}; border-color: ${border};`;
    }

    // 渲染字段卡片
    function renderFieldCard(field) {
      // 判断字段类型
      const isCustomAIField = field.id && field.id.startsWith('ai_custom_');
      const isAIField = field.id && field.id.startsWith('ai_') && !isCustomAIField;
      const isDefaultField = field.id && ['person_name', 'date_time', 'number_value', 'serial_number', 'contact_phone', 'account_email', 'company_department', 'location_address'].includes(field.id);
      const isDomainField = field.id && (field.id.startsWith('hr_') || field.id.startsWith('finance_') || field.id.startsWith('user_') || field.id.startsWith('order_'));
      const isCustomField = field.id && (field.id.startsWith('custom_') || isCustomAIField);

      // 可配置的字段类型
      const configurableFields = ['person_name', 'date_time', 'number_value', 'serial_number', 'finance_amount', 'contact_phone', 'location_address', 'account_email', 'company_department', 'enum'];
      const configType = field.configType || field.id;
      const hasConfig = configurableFields.includes(configType);
      const isAnyAIField = field.method === 'ai' || isAIField || isCustomAIField;
      const secondaryContent = isAnyAIField
        ? `<div class="field-desc">${getAIFieldSummary(field)}</div>`
        : `
            <div class="field-tags">
              ${field.tags.map(tag => `<span class="field-tag">${tag}</span>`).join('')}
            </div>
          `;

      // 根据字段类型决定显示的按钮
      // 1. AI字段：只有配置按钮
      // 2. 默认字段：只有配置按钮
      // 3. 领域字段：删除按钮 + 配置按钮
      // 4. 自定义字段：删除按钮 + 编辑按钮

      return `
        <div class="field-card" data-field-id="${field.id}">
          <div class="field-icon" style="${getFieldIconStyle(field)}">
            ${getFieldIconSVG(field)}
          </div>
          <div class="field-info">
            <div class="field-name">${field.name}</div>
            ${secondaryContent}
          </div>
          ${(() => {
          const buttons = [];
          
          if (isAIField) {
            // AI字段：只有配置按钮
            if (hasConfig) {
              buttons.push(`<button class="field-config-btn" data-config-field="${field.id}" title="配置"><svg><use href="#icon-edit"></use></svg></button>`);
            }
          } else if (isDefaultField) {
            // 默认字段：只有配置按钮
            if (hasConfig) {
              buttons.push(`<button class="field-config-btn" data-config-field="${field.id}" title="配置"><svg><use href="#icon-edit"></use></svg></button>`);
            }
          } else if (isDomainField) {
            // 领域字段：删除按钮 + 配置按钮
            buttons.push(`<button class="field-delete-btn" data-delete-field="${field.id}" title="删除字段"><svg><use href="#icon-delete"></use></svg></button>`);
            if (hasConfig) {
              buttons.push(`<button class="field-config-btn" data-config-field="${field.id}" title="配置"><svg><use href="#icon-edit"></use></svg></button>`);
            }
          } else if (isCustomField) {
            // 自定义字段：删除按钮 + 编辑按钮（包括自定义 AI 字段）
            buttons.push(`<button class="field-delete-btn" data-delete-field="${field.id}" title="删除字段"><svg><use href="#icon-delete"></use></svg></button>`);
            buttons.push(`<button class="field-edit-btn" data-edit-field="${field.id}" title="编辑字段"><svg><use href="#icon-edit"></use></svg></button>`);
          }
          
          return buttons.length > 0 ? `<div class="field-actions">${buttons.join('')}</div>` : '';
        })()}
        </div>
      `;
    }

    // 渲染文件夹
    function renderFolder(folder, fields, options = {}) {
      const folderStates = getFolderStates();
      const isCollapsed = folderStates[folder.id] || false;
      const collapsedClass = isCollapsed ? 'collapsed' : '';
      const canDeleteFolder = isFolderDeletable(folder);
      const showAddButton = options.showAddButton !== false;

      return `
        <div class="folder ${collapsedClass}" data-folder-id="${folder.id}">
          <div class="folder-header">
            <div class="folder-icon">
              <svg><use href="#icon-folder"></use></svg>
            </div>
            <div class="folder-name">${folder.name}</div>
            <div class="folder-actions">
              ${canDeleteFolder ? `<button class="folder-delete-btn" data-delete-folder="${folder.id}" title="删除文件夹"><svg><use href="#icon-delete"></use></svg></button>` : ''}
              ${showAddButton ? `<button class="folder-add-btn" data-folder-id="${folder.id}" title="新建字段"><svg><use href="#icon-add"></use></svg></button>` : ''}
            </div>
          </div>
          <div class="folder-content">
            ${fields.map(field => renderFieldCard(field)).join('')}
          </div>
        </div>
      `;
    }

    // 渲染字段列表
    function renderFieldsList() {
      const fieldsList = document.getElementById('fieldsList');

      if (currentTab === 'text') {
        // 文本填充 Tab
        let html = getVisibleSystemFolders().map(folder => {
          const fields = DEFAULT_FIELDS[folder.fields];
          return renderFolder(folder, fields);
        }).join('');

        // 添加自定义文件夹
        customFolders.forEach((folder) => {
          const folderData = {
            id: folder.id,
            name: folder.name
          };
          html += renderFolder(folderData, folder.fields);
        });

        fieldsList.innerHTML = html;
      } else {
        // 图片填充 Tab
        const imageFields = DEFAULT_FIELDS.imageFields;
        fieldsList.innerHTML = renderFolder(
          { id: 'imageFieldsPanel', name: '图片字段' },
          imageFields,
          { showAddButton: false }
        );
      }

      // 绑定文件夹折叠事件
      document.querySelectorAll('.folder-header').forEach(header => {
        header.addEventListener('click', (e) => {
          // 如果点击的是按钮，不触发折叠
          if (e.target.classList.contains('folder-add-btn') || 
              e.target.classList.contains('folder-delete-btn') ||
              e.target.closest('.folder-add-btn') ||
              e.target.closest('.folder-delete-btn')) {
            return;
          }
          const folder = header.closest('.folder');
          const folderId = folder.dataset.folderId;
          const isCollapsed = folder.classList.toggle('collapsed');
          saveFolderState(folderId, isCollapsed);
        });
      });

      // 绑定文件夹新建按钮事件
      document.querySelectorAll('.folder-add-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const folderId = btn.dataset.folderId;
          toggleAddMenu(false, folderId, btn);
        });
      });

      // 绑定字段点击事件
      document.querySelectorAll('.field-card').forEach(card => {
        card.addEventListener('click', (e) => {
          // 如果点击的是按钮，不触发填充
          if (e.target.classList.contains('field-config-btn') || 
              e.target.classList.contains('field-edit-btn') || 
              e.target.classList.contains('field-delete-btn') ||
              e.target.closest('.field-config-btn') ||
              e.target.closest('.field-edit-btn') ||
              e.target.closest('.field-delete-btn') ||
              e.target.closest('.field-actions')) {
            return;
          }
          const fieldId = card.dataset.fieldId;
          handleFieldClick(fieldId);
        });
      });

      // 绑定配置按钮事件
      document.querySelectorAll('.field-config-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation(); // 阻止事件冒泡
          const fieldId = btn.dataset.configField;
          showConfigPanel(fieldId);
        });
      });

      // 绑定编辑按钮事件
      document.querySelectorAll('.field-edit-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation(); // 阻止事件冒泡
          const fieldId = btn.dataset.editField;
          showEditFieldModal(fieldId);
        });
      });

      // 绑定字段删除按钮事件
      document.querySelectorAll('.field-delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation(); // 阻止事件冒泡
          const fieldId = btn.dataset.deleteField;
          showDeleteFieldConfirm(fieldId);
        });
      });

      // 绑定文件夹删除按钮事件
      document.querySelectorAll('.folder-delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation(); // 阻止事件冒泡
          const folderId = btn.dataset.deleteFolder;
          showDeleteFolderConfirm(folderId);
        });
      });
    }

    // Tab 切换
    const tabs = document.querySelectorAll('.tab');
    const hintText = document.getElementById('hintText');
    const searchInput = document.getElementById('searchInput');
    const newButton = document.getElementById('newButton');

    function syncTabUI() {
      if (currentTab === 'text') {
        hintText.textContent = '选中文本图层，单击字段，即可填充';
        searchInput.placeholder = '搜索字段类型';
        newButton.style.display = 'flex';
      } else {
        hintText.textContent = '选中图片图层，单击字段，即可填充内置素材';
        searchInput.placeholder = '搜索图片类型';
        newButton.style.display = 'none';
      }
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        // 移除所有 active 状态
        tabs.forEach(t => t.classList.remove('active'));
        // 添加当前 active 状态
        tab.classList.add('active');

        // 更新提示文本和当前 Tab
        currentTab = tab.dataset.tab;
        syncTabUI();

        // 重新渲染字段列表
        renderFieldsList();

        console.log('切换到:', currentTab);
      });
    });


    // 搜索框清除
    const searchClear = document.getElementById('searchClear');

    // 搜索功能
    searchInput.addEventListener('input', (e) => {
      const keyword = e.target.value.trim().toLowerCase();

      if (keyword === '') {
        // 清空搜索，显示所有字段
        renderFieldsList();
      } else {
        // 过滤字段
        filterFields(keyword);
      }
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      renderFieldsList();
      searchInput.focus();
    });

    // 过滤字段
    function filterFields(keyword) {
      const fieldsList = document.getElementById('fieldsList');
      let matchedFields = [];

      // 搜索所有字段
      for (const key in DEFAULT_FIELDS) {
        const fields = DEFAULT_FIELDS[key];
        const matched = fields.filter(field =>
          field.name.toLowerCase().includes(keyword) ||
          field.tags.some(tag => tag.toLowerCase().includes(keyword))
        );
        matchedFields = matchedFields.concat(matched);
      }

      customFolders.forEach(folder => {
        const matched = folder.fields.filter(field =>
          field.name.toLowerCase().includes(keyword) ||
          field.tags.some(tag => tag.toLowerCase().includes(keyword))
        );
        matchedFields = matchedFields.concat(matched);
      });

      // 渲染搜索结果
      if (matchedFields.length > 0) {
        const html = matchedFields.map(field => renderFieldCard(field)).join('');
        fieldsList.innerHTML = html;

        // 绑定字段点击事件
        document.querySelectorAll('.field-card').forEach(card => {
          card.addEventListener('click', () => {
            const fieldId = card.dataset.fieldId;
            handleFieldClick(fieldId);
          });
        });
      } else {
        fieldsList.innerHTML = '<div class="placeholder">未找到匹配的字段</div>';
      }
    }

    // 新建按钮
    newButton.addEventListener('click', () => {
      console.log('点击新建按钮');
      // 后续阶段实现
    });

    // 处理字段点击
    function handleFieldClick(fieldId) {
      console.log('点击字段:', fieldId);

      if (isBlockedByPaywall()) {
        showToast('免费额度已用完，请先付费激活');
        showLicenseModal();
        return;
      }

      const field = getFieldById(fieldId);
      const configType = field ? (field.configType || field.id) : fieldId;

      // 获取用户配置
      const userConfig = getFieldConfig(fieldId);

      // 合并静态配置 (如 options, min, max) 和用户配置
      // 用户配置优先级更高
      const payloadConfig = {
        ...field, // 包含 options, min, max 等定义在 DEFAULT_FIELDS 中的属性
        ...userConfig
      };

      // 直接发送字段 ID，让 code.ts 生成数据
      sendMessage('fill-text', {
        fieldId: fieldId,
        configType: configType,
        dynamicConfig: payloadConfig
      });
    }

    // 监听来自插件的消息
    window.addEventListener('message', (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      console.log('收到插件消息:', msg);

      switch (msg.type) {
        case 'fill-result':
          handleFillResult(msg.result, msg.message);
          break;

        case 'fill-error':
          showError(msg.message);
          break;

        case 'configs-loaded':
          // 配置加载完成，更新缓存
          fieldConfigsCache = msg.configs || {};
          console.log('配置已加载到 UI:', fieldConfigsCache);
          break;

        case 'custom-data-loaded':
          hydrateCustomData(msg.data || {});
          renderFieldsList();
          break;

        case 'custom-data-saved':
          console.log('自定义数据已保存');
          break;

        case 'ai-settings-loaded':
        case 'ai-settings-saved':
          aiSettingsCache = normalizeAISettings(msg.settings || {});
          break;

        case 'license-state-loaded':
        case 'license-state-saved':
          licenseStateCache = normalizeLicenseState(msg.license || {});
          usageStateCache = normalizeUsageState({
            ...usageStateCache,
            isPaid: licenseStateCache.status === 'valid'
          });
          updateLicenseBadge();
          break;

        case 'usage-state-loaded':
        case 'usage-state-saved':
          usageStateCache = normalizeUsageState(msg.usage || {});
          updateLicenseBadge();
          break;

        case 'license-activated':
          licenseStateCache = normalizeLicenseState(msg.license || {});
          usageStateCache = normalizeUsageState({
            ...usageStateCache,
            isPaid: true,
            isBlocked: false
          });
          updateLicenseBadge();
          document.getElementById('licenseStatusText').textContent = '授权激活成功';
          showToast('授权激活成功');
          document.getElementById('licenseModal').style.display = 'none';
          break;

        case 'license-error':
          licenseStateCache = normalizeLicenseState({
            ...licenseStateCache,
            status: 'invalid'
          });
          updateLicenseBadge();
          document.getElementById('licenseStatusText').textContent = msg.message || '授权校验失败';
          showError(msg.message || '授权校验失败');
          break;

        case 'paywall-required':
          showError(msg.message || '免费额度已用完，请先付费激活');
          showLicenseModal();
          break;

        case 'ai-preview-result':
          aiPreviewLoading = false;
          aiPreviewConfirmed = true;
          setAIPreviewState(msg.preview || 'AI 未返回内容', 'ready');
          syncAIFieldModalState();
          break;

        case 'ai-preview-error':
          aiPreviewLoading = false;
          aiPreviewConfirmed = false;
          setAIPreviewState(msg.message || 'AI 预览失败', 'error');
          syncAIFieldModalState();
          break;
      }
    });

    function hydrateCustomData(data) {
      customFields = Array.isArray(data.customFields) ? data.customFields.map(field => cloneField(field)) : [];
      customFolders = Array.isArray(data.customFolders)
        ? data.customFolders.map(folder => ({
            id: folder.id,
            name: folder.name,
            fields: []
          }))
        : [];
      removedSystemFolderKeys = Array.isArray(data.removedSystemFolderKeys)
        ? data.removedSystemFolderKeys.filter(key => !PROTECTED_SYSTEM_FOLDER_KEYS.includes(key))
        : [];

      customFields.forEach(field => {
        attachCustomFieldToFolder(field);
      });
    }

    // 处理填充结果
    function handleFillResult(result, message) {
      if (result.success > 0) {
        // 显示成功提示
        if (message) {
          showToast(message);
        } else {
          showToast(`填充成功：${result.success} 个图层`);
        }
        console.log(`填充成功: ${result.success} 个图层`);
        
        if (result.errors.length > 0) {
          console.log('提示:', result.errors);
        }
      } else {
        console.error('填充失败:', result.errors);
        if (result.errors.length > 0) {
          showError(result.errors[0]);
        }
      }
    }

    // 显示错误提示
    function showError(message) {
      console.error('错误:', message);

      // 创建错误提示元素
      const errorToast = document.createElement('div');
      errorToast.style.cssText = `
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #fee2e2;
        color: #dc2626;
        padding: 12px 20px;
        border-radius: 6px;
        font-size: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        z-index: 10000;
        animation: slideDown 0.3s ease;
      `;
      errorToast.textContent = message;

      // 添加到页面
      document.body.appendChild(errorToast);

      // 2秒后自动消失
      setTimeout(() => {
        errorToast.style.animation = 'slideUp 0.3s ease';
        setTimeout(() => {
          document.body.removeChild(errorToast);
        }, 300);
      }, 2000);
    }

    // ==================== 新建功能逻辑 ====================

    // 全局变量（使用内存存储）
    let customFields = [];
    let customFolders = [];
    let removedSystemFolderKeys = [];
    let pendingField = null; // 待分配文件夹的字段
    let selectedFolderId = '';
    let currentFolderId = null; // 当前操作的文件夹 ID

    function cloneField(field) {
      return JSON.parse(JSON.stringify(field));
    }

    function createCustomFolderId() {
      return 'custom_folder_' + Date.now();
    }

    function buildCustomDataPayload() {
      return {
        customFields: customFields.map(field => cloneField(field)),
        customFolders: customFolders.map(folder => ({
          ...cloneField(folder),
          fields: folder.fields.map(field => field.id)
        })),
        removedSystemFolderKeys: removedSystemFolderKeys.slice()
      };
    }

    function getCustomFolderById(folderId) {
      return customFolders.find(folder => folder.id === folderId) || null;
    }

    function getSystemFolderByFieldKey(fieldKey) {
      return FOLDERS.find(folder => folder.fields === fieldKey) || null;
    }

    function getSystemFolderById(folderId) {
      return FOLDERS.find(folder => folder.id === folderId) || null;
    }

    function isSystemFolderRemoved(fieldKey) {
      return removedSystemFolderKeys.includes(fieldKey);
    }

    function isFolderDeletable(folder) {
      if (!folder) return false;
      if (folder.id && folder.id.startsWith('custom_')) {
        return true;
      }
      if (!folder.fields) {
        return false;
      }
      return !PROTECTED_SYSTEM_FOLDER_KEYS.includes(folder.fields);
    }

    function getVisibleSystemFolders() {
      return FOLDERS.filter(folder => !isSystemFolderRemoved(folder.fields));
    }

    function removeCustomFieldFromCollections(fieldId) {
      for (const key in DEFAULT_FIELDS) {
        if (!Array.isArray(DEFAULT_FIELDS[key])) continue;
        DEFAULT_FIELDS[key] = DEFAULT_FIELDS[key].filter(field => field.id !== fieldId);
      }

      customFolders.forEach(folder => {
        folder.fields = folder.fields.filter(field => field.id !== fieldId);
      });
    }

    function attachCustomFieldToFolder(field) {
      if (!field.folderId) {
        return;
      }

      if (field.folderId.startsWith('custom_folder_')) {
        const folder = getCustomFolderById(field.folderId);
        if (folder) {
          folder.fields.push(field);
        }
        return;
      }

      if (DEFAULT_FIELDS[field.folderId] && Array.isArray(DEFAULT_FIELDS[field.folderId])) {
        DEFAULT_FIELDS[field.folderId].push(field);
      }
    }

    // 显示 Toast 提示
    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastMessage = toast.querySelector('.toast-message');
      toastMessage.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 显示/隐藏新建菜单
    function toggleAddMenu(isGlobal, folderId = null, buttonElement = null) {
      const menu = document.getElementById('addMenu');
      const isVisible = menu.style.display === 'block';

      if (isVisible) {
        menu.style.display = 'none';
        return;
      }

      currentFolderId = folderId;

      // 如果是文件夹内新建，隐藏"新建文件夹"选项
      const folderMenuItem = menu.querySelector('[data-action="add-folder"]');
      if (isGlobal) {
        folderMenuItem.style.display = 'flex';
      } else {
        folderMenuItem.style.display = 'none';
      }

      // 动态定位菜单
      if (buttonElement) {
        const rect = buttonElement.getBoundingClientRect();
        menu.style.top = (rect.bottom + 4) + 'px';
        menu.style.right = (window.innerWidth - rect.right) + 'px';
      }

      menu.style.display = 'block';
    }

    // 关闭所有对话框
    function closeAllModals() {
      document.querySelectorAll('.modal').forEach(modal => {
        modal.style.display = 'none';
      });
      // 清空表单
      document.getElementById('fieldTitle').value = '';
      document.getElementById('fieldContent').value = '';
      document.getElementById('aiFieldTitle').value = '';
      document.getElementById('aiFieldPrompt').value = '';
      document.getElementById('folderName').value = '';
      document.getElementById('addFieldModal').removeAttribute('data-edit-field-id');
      document.getElementById('addAIFieldModal').removeAttribute('data-edit-field-id');
      fillAISettingsForm(aiSettingsCache);
      invalidateAIPreview();
    }

    // 显示新建字段对话框
    function showAddFieldModal() {
      document.getElementById('addMenu').style.display = 'none';
      document.getElementById('addFieldModal').style.display = 'flex';
      // 重置标题为"新建字段"
      document.querySelector('#addFieldModal .modal-header h3').textContent = '新建字段';
      // 清空表单
      document.getElementById('fieldTitle').value = '';
      document.getElementById('fieldContent').value = '';
      // 移除编辑标记
      document.getElementById('addFieldModal').removeAttribute('data-edit-field-id');
    }

    // 显示编辑字段对话框
    function showEditFieldModal(fieldId) {
      // 查找字段
      const field = customFields.find(f => f.id === fieldId);
      if (!field) return;

      if (field.method === 'ai') {
        showEditAIFieldModal(fieldId);
        return;
      }

      // 填充表单
      document.getElementById('fieldTitle').value = field.name;
      document.getElementById('fieldContent').value = field.options.join('\n');

      // 修改标题为"编辑字段"
      document.querySelector('#addFieldModal .modal-header h3').textContent = '编辑字段';

      // 标记为编辑模式
      document.getElementById('addFieldModal').setAttribute('data-edit-field-id', fieldId);

      // 显示对话框
      document.getElementById('addFieldModal').style.display = 'flex';
    }

    function showEditAIFieldModal(fieldId) {
      const field = customFields.find(f => f.id === fieldId);
      if (!field) return;

      document.getElementById('addMenu').style.display = 'none';
      document.getElementById('aiFieldTitle').value = field.name || '';
      document.getElementById('aiFieldPrompt').value = field.prompt || '';
      fillAISettingsForm({
        ...aiSettingsCache,
        model: field.model || aiSettingsCache.model,
        temperature: field.temperature ?? aiSettingsCache.temperature,
        maxTokens: field.maxTokens ?? aiSettingsCache.maxTokens
      });

      const modal = document.getElementById('addAIFieldModal');
      modal.setAttribute('data-edit-field-id', fieldId);
      modal.querySelector('.modal-header h3').textContent = '编辑 AI 字段';

      if (field.previewContent) {
        aiPreviewConfirmed = true;
        aiPreviewLoading = false;
        setAIPreviewState(field.previewContent, 'ready');
      } else {
        invalidateAIPreview();
      }

      syncAIFieldModalState();
      modal.style.display = 'flex';
    }

    // 显示新建 AI 字段对话框
    function showAddAIFieldModal() {
      document.getElementById('addMenu').style.display = 'none';
      document.getElementById('aiFieldTitle').value = '';
      document.getElementById('aiFieldPrompt').value = '';
      fillAISettingsForm(aiSettingsCache);
      const modal = document.getElementById('addAIFieldModal');
      modal.removeAttribute('data-edit-field-id');
      modal.querySelector('.modal-header h3').textContent = '新建 AI 字段';
      invalidateAIPreview();
      modal.style.display = 'flex';
    }

    // 显示新建文件夹对话框
    function showAddFolderModal() {
      document.getElementById('addMenu').style.display = 'none';
      document.getElementById('addFolderModal').style.display = 'flex';
    }

    // 显示文件夹选择器
    function showFolderSelector(field) {
      pendingField = field;
      selectedFolderId = '';
      const modal = document.getElementById('folderSelectorModal');
      const folderList = document.getElementById('folderList');
      const confirmBtn = document.getElementById('folderSelectorConfirm');
      const titleNode = modal.querySelector('.modal-header h3');

      // 渲染文件夹列表
      let html = '';

      DEFAULT_FOLDER_DEFS.filter(folder => !isSystemFolderRemoved(folder.id)).forEach(folder => {
        html += `
          <div class="folder-selector-item" data-folder-id="${folder.id}">
            <svg><use href="#icon-folder"></use></svg>
            <span>${folder.name}</span>
          </div>
        `;
      });

      // 自定义文件夹
      customFolders.forEach((folder) => {
        html += `
          <div class="folder-selector-item" data-folder-id="${folder.id}">
            <svg><use href="#icon-folder"></use></svg>
            <span>${folder.name}</span>
          </div>
        `;
      });

      folderList.innerHTML = html;
      confirmBtn.disabled = true;
      titleNode.textContent = '新建字段';
      modal.style.display = 'flex';
    }

    // 创建自定义字段
    function createCustomField(title, content, folderId) {
      // 将多行内容按行分割为数组
      const options = content.split('\n').map(line => line.trim()).filter(line => line.length > 0);

      const field = {
        id: 'custom_' + Date.now(),
        name: title,
        configType: 'enum', // 使用 enum 类型以复用现有逻辑
        options: options,
        folderId: folderId,
        icon: '📝',
        iconBg: '#e0e7ff',
        iconColor: '#4f46e5',
        tags: ['自定义']
      };

      customFields.push(field);
      attachCustomFieldToFolder(field);
      saveCustomData();
      renderFieldsList();
      showToast(`字段"${title}"创建成功`);
    }

    // 创建自定义 AI 字段
    function createCustomAIField(title, prompt, folderId, aiOptions = {}, previewContent = '') {
      const field = {
        id: 'ai_custom_' + Date.now(),
        name: title,
        type: 'text',
        method: 'ai',
        prompt: prompt,
        provider: aiOptions.provider || 'deepseek',
        model: aiOptions.model || 'deepseek-chat',
        temperature: aiOptions.temperature ?? 0.8,
        maxTokens: aiOptions.maxTokens ?? 256,
        description: prompt,
        previewContent: previewContent || '',
        folderId: folderId,
        icon: '⚡',
        iconBg: '#f3e8ff',
        iconColor: '#9333ea',
        tags: ['AI', '自定义', aiOptions.model || 'deepseek-chat']
      };

      customFields.push(field);
      attachCustomFieldToFolder(field);
      saveCustomData();
      renderFieldsList();
      showToast(`AI 字段"${title}"创建成功`);
    }

    function updateCustomAIField(fieldId, title, prompt, aiOptions = {}, previewContent = '') {
      const fieldIndex = customFields.findIndex(f => f.id === fieldId);
      if (fieldIndex === -1) return;

      const existingField = customFields[fieldIndex];
      const updatedField = {
        ...existingField,
        name: title,
        prompt: prompt,
        provider: aiOptions.provider || existingField.provider || 'deepseek',
        model: aiOptions.model || existingField.model || 'deepseek-chat',
        temperature: aiOptions.temperature ?? existingField.temperature ?? 0.8,
        maxTokens: aiOptions.maxTokens ?? existingField.maxTokens ?? 256,
        description: prompt,
        previewContent: previewContent || existingField.previewContent || ''
      };

      customFields[fieldIndex] = updatedField;
      removeCustomFieldFromCollections(fieldId);
      attachCustomFieldToFolder(updatedField);
      saveCustomData();
      renderFieldsList();
      showToast(`AI 字段"${title}"已更新`);
    }

    // 更新自定义字段
    function updateCustomField(fieldId, title, content) {
      // 将多行内容按行分割为数组
      const options = content.split('\n').map(line => line.trim()).filter(line => line.length > 0);

      // 更新 customFields 数组中的字段
      const fieldIndex = customFields.findIndex(f => f.id === fieldId);
      if (fieldIndex !== -1) {
        customFields[fieldIndex].name = title;
        customFields[fieldIndex].options = options;
      }
      removeCustomFieldFromCollections(fieldId);
      const updatedField = customFields[fieldIndex];
      if (updatedField) {
        attachCustomFieldToFolder(updatedField);
      }
      saveCustomData();
      renderFieldsList();
      showToast(`字段"${title}"已更新`);
    }

    // 创建自定义文件夹
    function createCustomFolder(name) {
      const folder = {
        id: createCustomFolderId(),
        name: name,
        fields: []
      };

      customFolders.push(folder);
      saveCustomData();
      renderFieldsList();
      showToast(`文件夹"${name}"创建成功`);
    }

    // 保存自定义数据（暂时不实现持久化）
    function saveCustomData() {
      sendMessage('save-custom-data', {
        data: buildCustomDataPayload()
      });
    }

    // 加载自定义数据（暂时不实现）
    function loadCustomData() {
      sendMessage('load-custom-data');
    }

    // ==================== 删除功能 ====================
    let deleteTarget = null; // { type: 'field' | 'folder', id: string, name: string }

    // 显示删除字段确认对话框
    function showDeleteFieldConfirm(fieldId) {
      const deleteConfirmTitle = document.getElementById('deleteConfirmTitle');
      const deleteConfirmMessage = document.getElementById('deleteConfirmMessage');
      // 查找字段信息
      let field = null;
      let folderId = null;
      let isDomainField = false;
      let domainCategory = null;
      let domainFieldIndex = -1;

      // 判断是否为领域字段
      if (fieldId.startsWith('hr_') || fieldId.startsWith('finance_') || 
          fieldId.startsWith('user_') || fieldId.startsWith('order_')) {
        isDomainField = true;
        
        // 确定所属领域
        if (fieldId.startsWith('hr_')) domainCategory = 'hrFields';
        else if (fieldId.startsWith('finance_')) domainCategory = 'financeFields';
        else if (fieldId.startsWith('user_')) domainCategory = 'accountFields';
        else if (fieldId.startsWith('order_')) domainCategory = 'orderFields';
        
        // 在DEFAULT_FIELDS中查找
        domainFieldIndex = DEFAULT_FIELDS[domainCategory].findIndex(f => f.id === fieldId);
        if (domainFieldIndex !== -1) {
          field = DEFAULT_FIELDS[domainCategory][domainFieldIndex];
        }
      } else {
        // 在自定义字段中查找
        const customFieldIndex = customFields.findIndex(f => f.id === fieldId);
        if (customFieldIndex !== -1) {
          field = customFields[customFieldIndex];
        } else {
          // 在自定义文件夹中查找
          for (let i = 0; i < customFolders.length; i++) {
            const idx = customFolders[i].fields.findIndex(f => f.id === fieldId);
            if (idx !== -1) {
              field = customFolders[i].fields[idx];
              folderId = customFolders[i].id;
              break;
            }
          }
        }
      }

      if (!field) {
        showToast('未找到该字段');
        return;
      }

      // 保存删除目标
      const customFieldIndex = customFields.findIndex(f => f.id === fieldId);
      deleteTarget = {
        type: 'field',
        id: fieldId,
        name: field.name,
        customFieldIndex,
        folderId,
        isDomainField,
        domainCategory,
        domainFieldIndex
      };

      // 显示确认对话框
      deleteConfirmTitle.textContent = '确认删除字段？';
      deleteConfirmMessage.textContent = '您确定要删除此字段吗？此操作无法撤消。';
      document.getElementById('deleteConfirmModal').style.display = 'flex';
    }

    // 显示删除文件夹确认对话框
    function showDeleteFolderConfirm(folderId) {
      const deleteConfirmTitle = document.getElementById('deleteConfirmTitle');
      const deleteConfirmMessage = document.getElementById('deleteConfirmMessage');
      const customFolder = getCustomFolderById(folderId);
      const systemFolder = getSystemFolderById(folderId);
      const folder = customFolder || systemFolder;

      if (!folder) {
        showToast('未找到该文件夹');
        return;
      }

      if (!isFolderDeletable(folder)) {
        showToast(`文件夹"${folder.name}"不可删除`);
        return;
      }

      const fieldCount = customFolder
        ? customFolder.fields.length
        : Array.isArray(DEFAULT_FIELDS[systemFolder.fields]) ? DEFAULT_FIELDS[systemFolder.fields].length : 0;

      // 保存删除目标
      deleteTarget = {
        type: 'folder',
        id: folderId,
        name: folder.name,
        fieldCount,
        isSystemFolder: Boolean(systemFolder && !customFolder),
        systemFieldKey: systemFolder ? systemFolder.fields : ''
      };

      // 显示确认对话框
      deleteConfirmTitle.textContent = '确认删除文件夹？';
      deleteConfirmMessage.textContent = '您确定要删除此文件夹吗？此操作无法撤消。';
      document.getElementById('deleteConfirmModal').style.display = 'flex';
    }

    // 执行删除操作
    function executeDelete() {
      if (!deleteTarget) return;

      if (deleteTarget.type === 'field') {
        // 删除字段
        if (deleteTarget.isDomainField && deleteTarget.domainFieldIndex !== -1) {
          // 从领域字段中删除
          DEFAULT_FIELDS[deleteTarget.domainCategory].splice(deleteTarget.domainFieldIndex, 1);
        } else if (deleteTarget.customFieldIndex !== -1) {
          removeCustomFieldFromCollections(deleteTarget.id);
          customFields.splice(deleteTarget.customFieldIndex, 1);
        }

        saveCustomData();
        renderFieldsList();
        showToast(`字段"${deleteTarget.name}"已删除`);
      } else if (deleteTarget.type === 'folder') {
        if (deleteTarget.isSystemFolder) {
          removedSystemFolderKeys = Array.from(new Set([...removedSystemFolderKeys, deleteTarget.systemFieldKey]));
          customFields = customFields.filter(field => field.folderId !== deleteTarget.systemFieldKey);
        } else {
          const folder = getCustomFolderById(deleteTarget.id);
          const fieldIds = folder ? folder.fields.map(field => field.id) : [];
          customFields = customFields.filter(field => !fieldIds.includes(field.id));
          customFolders = customFolders.filter(folder => folder.id !== deleteTarget.id);
        }
        saveCustomData();
        renderFieldsList();
        showToast(`文件夹"${deleteTarget.name}"已删除`);
      }

      // 关闭对话框并清空删除目标
      document.getElementById('deleteConfirmModal').style.display = 'none';
      deleteTarget = null;
    }

    // 绑定删除确认对话框事件
    const deleteConfirmModal = document.getElementById('deleteConfirmModal');
    const deleteConfirmBtn = document.getElementById('deleteConfirmBtn');

    deleteConfirmModal.querySelectorAll('.modal-close, .modal-cancel').forEach(btn => {
      btn.addEventListener('click', () => {
        deleteConfirmModal.style.display = 'none';
        deleteTarget = null;
      });
    });

    deleteConfirmModal.querySelector('.modal-overlay').addEventListener('click', () => {
      deleteConfirmModal.style.display = 'none';
      deleteTarget = null;
    });

    deleteConfirmBtn.addEventListener('click', () => {
      executeDelete();
    });

    // 初始化
    console.log('Data Fill UI 已加载');
    loadCustomData(); // 加载自定义数据
    sendMessage('load-ai-settings');
    sendMessage('load-license-state');
    sendMessage('load-usage-state');
    updateLicenseBadge();
    syncTabUI();
    renderFieldsList();

    // ==================== 新建功能事件监听 ====================

    // 全局新建按钮
    document.getElementById('newButton').addEventListener('click', (e) => {
      e.stopPropagation();
      const button = e.currentTarget;
      toggleAddMenu(true, null, button);
    });

    // 新建菜单项点击
    document.querySelectorAll('.add-menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const action = item.dataset.action;
        if (action === 'add-field') {
          showAddFieldModal();
        } else if (action === 'add-ai-field') {
          showAddAIFieldModal();
        } else if (action === 'add-folder') {
          showAddFolderModal();
        }
      });
    });

    // 关闭对话框
    document.querySelectorAll('.modal-close, .modal-cancel').forEach(btn => {
      btn.addEventListener('click', closeAllModals);
    });

    // 点击遮罩关闭
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', closeAllModals);
    });

    document.getElementById('aiPreviewBtn').addEventListener('click', requestAIPreview);
    document.getElementById('licenseActivateBtn').addEventListener('click', () => {
      const licenseKey = document.getElementById('licenseKeyInput').value.trim();
      if (!licenseKey) {
        document.getElementById('licenseStatusText').textContent = '请输入授权码';
        return;
      }

      document.getElementById('licenseStatusText').textContent = '授权校验中，请稍候...';
      sendMessage('activate-license', { licenseKey });
    });

    ['aiFieldTitle', 'aiFieldPrompt', 'aiFieldApiKey', 'aiFieldModel', 'aiFieldTemperature', 'aiFieldMaxTokens'].forEach(id => {
      const element = document.getElementById(id);
      element.addEventListener('input', invalidateAIPreview);
    });

    document.querySelector('.trial-badge').addEventListener('click', showLicenseModal);

    // 新建/编辑字段确认
    document.querySelector('#addFieldModal .modal-confirm').addEventListener('click', () => {
      const title = document.getElementById('fieldTitle').value.trim();
      const content = document.getElementById('fieldContent').value.trim();

      if (!title) {
        showToast('请输入字段标题');
        return;
      }

      if (!content) {
        showToast('请输入示例内容');
        return;
      }

      const modal = document.getElementById('addFieldModal');
      const editFieldId = modal.getAttribute('data-edit-field-id');

      closeAllModals();

      if (editFieldId) {
        // 编辑模式
        closeAllModals();
        updateCustomField(editFieldId, title, content);
      } else {
        // 新建模式
        if (currentFolderId) {
          closeAllModals();
          createCustomField(title, content, currentFolderId);
        } else {
          document.getElementById('addFieldModal').style.display = 'none';
          showFolderSelector({ title, content, type: 'field' });
        }
      }
    });

    // 新建 AI 字段确认
    document.querySelector('#addAIFieldModal .modal-confirm').addEventListener('click', () => {
      const title = document.getElementById('aiFieldTitle').value.trim();
      const prompt = document.getElementById('aiFieldPrompt').value.trim();
      const aiOptions = readAISettingsForm();
      const modal = document.getElementById('addAIFieldModal');
      const editFieldId = modal.getAttribute('data-edit-field-id');
      const previewContent = aiPreviewContent;

      if (!title) {
        showToast('请输入字段标题');
        return;
      }

      if (!prompt) {
        showToast('请输入 AI 提示词');
        return;
      }

      if (!aiPreviewConfirmed) {
        showToast('请先确认提示词并生成预览');
        return;
      }

      sendMessage('save-ai-settings', {
        settings: aiOptions
      });

      if (editFieldId) {
        updateCustomAIField(editFieldId, title, prompt, aiOptions, previewContent);
        closeAllModals();
        return;
      }

      // 如果是文件夹内新建，直接创建
      if (currentFolderId) {
        createCustomAIField(title, prompt, currentFolderId, aiOptions, previewContent);
        closeAllModals();
      } else {
        // 全局新建，显示文件夹选择器
        document.getElementById('addAIFieldModal').style.display = 'none';
        showFolderSelector({ title, prompt, type: 'ai-field', aiOptions, previewContent });
      }
    });

    // 新建文件夹确认
    document.querySelector('#addFolderModal .modal-confirm').addEventListener('click', () => {
      const name = document.getElementById('folderName').value.trim();

      if (!name) {
        showToast('请输入文件夹名称');
        return;
      }

      closeAllModals();
      createCustomFolder(name);
    });

    // 文件夹选择器点击
    document.getElementById('folderList').addEventListener('click', (e) => {
      const item = e.target.closest('.folder-selector-item');
      if (!item) return;

      selectedFolderId = item.dataset.folderId || '';
      document.querySelectorAll('.folder-selector-item').forEach(node => {
        node.classList.toggle('selected', node === item);
      });
      document.getElementById('folderSelectorConfirm').disabled = !selectedFolderId;
    });

    document.getElementById('folderSelectorConfirm').addEventListener('click', () => {
      if (!pendingField || !selectedFolderId) {
        return;
      }

      if (pendingField.type === 'field') {
        createCustomField(pendingField.title, pendingField.content, selectedFolderId);
      } else if (pendingField.type === 'ai-field') {
        createCustomAIField(pendingField.title, pendingField.prompt, selectedFolderId, pendingField.aiOptions, pendingField.previewContent);
      }

      pendingField = null;
      selectedFolderId = '';
      closeAllModals();
    });

    // 点击其他地方关闭菜单
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('addMenu');
      if (menu.style.display === 'block' && !e.target.closest('#addMenu') && !e.target.closest('#newButton')) {
        menu.style.display = 'none';
      }
    });
  </script>
</body>
