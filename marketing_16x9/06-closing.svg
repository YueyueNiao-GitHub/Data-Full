    <text fill="#FFFFFF" font-family="Songti SC, STSong, Times New Roman, serif" font-size="84" font-weight="700"><tspan x="110" y="236">如果你经常要为原型补数据，</tspan><tspan x="110" y="332">这款插件会很适合你</tspan></text>
    <rect x="110" y="492" width="760" height="374" rx="34" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    
      <text x="156" y="560" fill="#A7E6D9" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="26" font-weight="700">适合这些场景</text>
      <text fill="#E9EEF4" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="32" font-weight="600"><tspan x="156" y="626">原型设计阶段快速补列表、表单、卡片内容</tspan><tspan x="156" y="673">B 端系统页面验证信息密度与排版节奏</tspan><tspan x="156" y="720">Demo、汇报稿、方案展示前临时补真实感数据</tspan><tspan x="156" y="767">希望把数据填充方式沉淀成长期可复用资产</tspan></text>
    
    <rect x="920" y="492" width="890" height="374" rx="34" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    
      <text x="966" y="560" fill="#A7E6D9" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="26" font-weight="700">对外宣传建议这样收尾</text>
      <text fill="#FFFFFF" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="34" font-weight="600"><tspan x="966" y="626">Data Fill 不是单纯的随机数据工具，</tspan><tspan x="966" y="676">而是一套可管理、可复用、可积累的字段填充系统。</tspan><tspan x="966" y="726">如果你也经常在 Figma 里补数据，欢迎直接试用。</tspan></text>
    
