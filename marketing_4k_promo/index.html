<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Fill 4K Promo</title>
  <style>
    body { margin: 0; padding: 28px; background: #f6f8fc; font-family: PingFang SC, Microsoft YaHei, sans-serif; color: #10264A; }
    h1 { margin: 0 0 10px; font-size: 30px; }
    p { margin: 0 0 18px; color: #445879; }
    .card { background: #fff; border: 1px solid #D6E2F4; border-radius: 14px; padding: 16px; margin-bottom: 24px; }
    .label { margin-bottom: 10px; font-weight: 700; color: #1E5EFF; }
    img { width: 100%; display: block; border: 1px solid #D6E2F4; }
  </style>
</head>
<body>
  <h1>Data Fill 4K 宣传图</h1>
  <p>浅色企业展示风，4K 导出，围绕结果、痛点、方案、能力、使用、转化六页展开。</p>
  
    <div class="card">
      <div class="label">01-cover.svg</div>
      <img src="./png/01-cover.png" alt="01-cover.svg" />
    </div>
  
    <div class="card">
      <div class="label">02-pain.svg</div>
      <img src="./png/02-pain.png" alt="02-pain.svg" />
    </div>
  
    <div class="card">
      <div class="label">03-solution.svg</div>
      <img src="./png/03-solution.png" alt="03-solution.svg" />
    </div>
  
    <div class="card">
      <div class="label">04-features.svg</div>
      <img src="./png/04-features.png" alt="04-features.svg" />
    </div>
  
    <div class="card">
      <div class="label">05-workflow.svg</div>
      <img src="./png/05-workflow.png" alt="05-workflow.svg" />
    </div>
  
    <div class="card">
      <div class="label">06-cta.svg</div>
      <img src="./png/06-cta.png" alt="06-cta.svg" />
    </div>
  
</body>
</html>
