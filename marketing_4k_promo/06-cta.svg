    <text fill="#10264A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="600" font-style="normal"><tspan x="206" y="1128">原型设计阶段快速补列表、表单、卡片内容</tspan><tspan x="206" y="1187">验证信息密度、排版节奏和页面真实感</tspan><tspan x="206" y="1246">把常用填充方式沉淀成长期可复用资产</tspan></text>
  
      
