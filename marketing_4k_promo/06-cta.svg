    <text fill="#10264A" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="40" font-weight="600" font-style="normal"><tspan x="1918" y="1128">Data Fill 的价值不在于“随机生成”</tspan><tspan x="1918" y="1187">而在于把填数据这件事</tspan><tspan x="1918" y="1246">从重复劳动变成稳定工作流</tspan></text>
  
